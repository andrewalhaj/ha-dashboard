server {
    listen 0.0.0.0:5051;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /tv_snapshot.png {
        # Replace HA_HOST with your Home Assistant server address
        proxy_pass http://HA_HOST:8123/local/tv_snapshot.png;
        proxy_set_header X-Forwarded-For "";
        proxy_cache_valid 200 10s;
    }

    location /ha-ws {
        proxy_pass http://HA_HOST:8123/api/websocket;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For "";
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location /ha-api/ {
        proxy_pass http://HA_HOST:8123/api/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Forwarded-For "";
        proxy_pass_request_headers on;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    location /govee-api/ {
        proxy_pass https://openapi.api.govee.com/router/api/v1/;
        proxy_ssl_server_name on;
        proxy_set_header Host openapi.api.govee.com;
        proxy_set_header X-Forwarded-For "";
        proxy_pass_request_headers on;
    }

    # Glances — uncomment and replace with your Glances host
    #location /glances-api/ {
    #    proxy_pass http://GLANCES_HOST:61208/api/4/;
    #    proxy_set_header X-Forwarded-For "";
    #    proxy_read_timeout 10s;
    #    proxy_connect_timeout 5s;
    #}
}
